{% extends "base.html" %}
{% block title %}Iniciar Sesión — PanelSSH{% endblock %}

{% block content %}
<div class="min-h-[85vh] flex items-center justify-center px-4">
    <div class="w-full max-w-md fade-in">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-accent mb-4 shadow-lg shadow-accent/20">
                <i class="fas fa-terminal text-white text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-white">PanelSSH</h1>
            <p class="text-sm text-muted mt-1">Administración de Usuarios Dropbear</p>
        </div>

        <!-- Login Card -->
        <div class="card p-6 md:p-8">
            <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-5">
                <!-- Role Toggle -->
                <div class="flex bg-surface-hover rounded-lg p-1 border border-white/5">
                    <button type="button" onclick="switchLogin('admin')" id="btn-admin"
                            class="flex-1 py-2.5 px-4 rounded-md text-sm font-semibold transition-all bg-accent text-white shadow-sm">
                        <i class="fas fa-shield-alt mr-1.5"></i>Admin
                    </button>
                    <button type="button" onclick="switchLogin('reseller')" id="btn-reseller"
                            class="flex-1 py-2.5 px-4 rounded-md text-sm font-medium transition-all text-muted">
                        <i class="fas fa-store mr-1.5"></i>Revendedor
                    </button>
                </div>
                <input type="hidden" name="login_as" id="login_as" value="admin">

                <div>
                    <label class="block text-sm font-medium text-muted mb-1.5">
                        <i class="fas fa-user mr-1"></i>Usuario
                    </label>
                    <input type="text" name="username" class="input" placeholder="Ingresa tu usuario" required autofocus>
                </div>

                <div>
                    <label class="block text-sm font-medium text-muted mb-1.5">
                        <i class="fas fa-lock mr-1"></i>Contraseña
                    </label>
                    <input type="password" name="password" class="input" placeholder="Ingresa tu contraseña" required>
                </div>

                <button type="submit" class="btn btn-primary w-full justify-center py-3 text-base">
                    <i class="fas fa-sign-in-alt"></i>Iniciar Sesión
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-sm text-muted">
                    ¿Eres revendedor y no tienes cuenta?
                    <a href="{{ url_for('auth.register') }}" class="text-accent hover:underline font-medium">Regístrate aquí</a>
                </p>
            </div>
        </div>

        <p class="text-center text-[11px] text-muted mt-6">PanelSSH &mdash; Desarrollado para gestión de usuarios Dropbear</p>
    </div>
</div>

<script>
function switchLogin(type) {
    document.getElementById('login_as').value = type;
    const ab = document.getElementById('btn-admin');
    const rb = document.getElementById('btn-reseller');
    if (type === 'admin') {
        ab.className = 'flex-1 py-2.5 px-4 rounded-md text-sm font-semibold transition-all bg-accent text-white shadow-sm';
        rb.className = 'flex-1 py-2.5 px-4 rounded-md text-sm font-medium transition-all text-muted';
    } else {
        rb.className = 'flex-1 py-2.5 px-4 rounded-md text-sm font-semibold transition-all bg-accent text-white shadow-sm';
        ab.className = 'flex-1 py-2.5 px-4 rounded-md text-sm font-medium transition-all text-muted';
    }
}
</script>
{% endblock %}
