{% extends "base.html" %}
{% block title %}Registro — PanelSSH{% endblock %}

{% block content %}
<div class="min-h-[90vh] flex items-center justify-center">
    <div class="w-full max-w-md fade-in">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-accent mb-4">
                <i class="fas fa-store text-white text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-white">Registro</h1>
            <p class="text-sm text-muted mt-1">Crea tu cuenta de revendedor</p>
        </div>

        <div class="card p-8">
            <form method="POST" action="{{ url_for('auth.register') }}" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-muted mb-1.5">Nombre de Usuario</label>
                    <input type="text" name="username" class="input" placeholder="Ej: vendedor1" required minlength="3">
                </div>

                <div>
                    <label class="block text-sm font-medium text-muted mb-1.5">
                        Email <span class="text-xs text-muted/60">(opcional)</span>
                    </label>
                    <input type="email" name="email" class="input" placeholder="tu@email.com">
                </div>

                <div>
                    <label class="block text-sm font-medium text-muted mb-1.5">Contraseña</label>
                    <input type="password" name="password" class="input" placeholder="Mínimo 6 caracteres" required minlength="6">
                </div>

                <div class="bg-surface-hover rounded-lg p-4 border border-warning/20">
                    <div class="flex items-start gap-3">
                        <i class="fas fa-info-circle text-warning text-sm mt-0.5"></i>
                        <div class="text-sm text-muted">
                            <p class="text-warning font-medium mb-1">Importante</p>
                            <p>Tu cuenta quedará <strong class="text-white">pendiente de activación</strong>. El administrador debe aprobarla y asignarte créditos.</p>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-full justify-center py-2.5 text-sm">
                    <i class="fas fa-user-plus"></i>Crear Cuenta
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-sm text-muted">
                    ¿Ya tienes cuenta?
                    <a href="{{ url_for('auth.login') }}" class="text-accent hover:underline font-medium">Inicia sesión</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
