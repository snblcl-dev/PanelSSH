{% extends "base.html" %}
{% block title %}Editar Revendedor — SSH Panel{% endblock %}
{% block content %}
<div class="fade-in">
    <div class="max-w-2xl mx-auto">
        <div class="flex items-center gap-3 mb-6">
            <a href="{{ url_for('admin.resellers') }}" class="text-gray-500 hover:text-white transition-colors">
                <i class="fas fa-arrow-left text-xl"></i>
            </a>
            <div>
                <h1 class="text-2xl font-bold text-white">
                    <i class="fas fa-user-edit text-purple-400 mr-2"></i>Editar Revendedor
                </h1>
                <p class="text-gray-500 text-sm mt-1">{{ reseller.username }}</p>
            </div>
        </div>

        <div class="glass-card p-6">
            <form method="POST" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Nombre de Usuario</label>
                    <input type="text" name="username" class="input-field" value="{{ reseller.username }}" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Email</label>
                    <input type="email" name="email" class="input-field" value="{{ reseller.email or '' }}" placeholder="Sin email">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Nueva Contraseña <span class="text-gray-600">(dejar vacío para mantener)</span></label>
                    <input type="password" name="password" class="input-field" placeholder="Mínimo 6 caracteres" minlength="6">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Notas</label>
                    <textarea name="notes" class="input-field" rows="3" placeholder="Notas internas...">{{ reseller.notes or '' }}</textarea>
                </div>
                <div class="flex gap-3 pt-2">
                    <a href="{{ url_for('admin.resellers') }}" class="btn-ghost flex-1 py-3 text-center">Cancelar</a>
                    <button type="submit" class="btn-primary flex-1 py-3">
                        <i class="fas fa-save mr-2"></i>Guardar Cambios
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
