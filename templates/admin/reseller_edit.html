{% extends "base.html" %}
{% block title %}Editar — PanelSSH{% endblock %}
{% block content %}
<div class="fade-in max-w-lg mx-auto">
    <a href="{{ url_for('admin.resellers') }}" class="text-muted hover:text-white text-sm mb-4 inline-flex items-center gap-1"><i class="fas fa-arrow-left"></i>Volver a Revendedores</a>
    <h1 class="text-xl font-bold text-white mb-5"><i class="fas fa-edit text-accent mr-2"></i>Editar {{ reseller.username }}</h1>
    <div class="card p-6">
        <form method="POST" class="space-y-4">
            <div><label class="block text-sm font-medium text-muted mb-1.5">Nombre de Usuario</label><input type="text" name="username" class="input" value="{{ reseller.username }}" required></div>
            <div><label class="block text-sm font-medium text-muted mb-1.5">Email</label><input type="email" name="email" class="input" value="{{ reseller.email or '' }}"></div>
            <div><label class="block text-sm font-medium text-muted mb-1.5">Nueva Contraseña <span class="text-muted/60 text-xs">(dejar vacío para no cambiar)</span></label><input type="password" name="password" class="input" placeholder="Mínimo 6 caracteres" minlength="6"></div>
            <div><label class="block text-sm font-medium text-muted mb-1.5">Notas</label><textarea name="notes" class="input" rows="3">{{ reseller.notes or '' }}</textarea></div>
            <button type="submit" class="btn btn-primary"><i class="fas fa-save mr-1.5"></i>Guardar Cambios</button>
        </form>
    </div>
</div>
{% endblock %}
