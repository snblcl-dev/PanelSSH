{% extends "base.html" %}
{% block title %}Perfil — PanelSSH{% endblock %}
{% block content %}
<div class="fade-in max-w-lg mx-auto">
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-accent mb-3"><span class="text-white text-2xl font-bold">{{ current_user.username[0]|upper }}</span></div>
        <h1 class="text-xl font-bold text-white">Mi Perfil</h1><p class="text-sm text-muted mt-1">{{ current_user.username }}</p>
    </div>
    <div class="card p-6">
        <form method="POST" action="{{ url_for('admin.change_password') }}" class="space-y-4">
            <div><label class="block text-sm font-medium text-muted mb-1.5">Contraseña Actual</label><input type="password" name="current_password" class="input" required></div>
            <div><label class="block text-sm font-medium text-muted mb-1.5">Nueva Contraseña</label><input type="password" name="new_password" class="input" required minlength="6"></div>
            <div><label class="block text-sm font-medium text-muted mb-1.5">Confirmar</label><input type="password" name="confirm_password" class="input" required minlength="6"></div>
            <button type="submit" class="btn btn-primary w-full justify-center"><i class="fas fa-save"></i>Cambiar Contraseña</button>
        </form>
    </div>
</div>
{% endblock %}
