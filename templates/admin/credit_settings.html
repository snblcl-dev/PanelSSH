{% extends "base.html" %}
{% block title %}Créditos — PanelSSH{% endblock %}
{% block content %}
<div class="fade-in max-w-2xl mx-auto">
    <div class="flex items-center gap-3 mb-6"><a href="{{ url_for('admin.resellers') }}" class="text-muted hover:text-white"><i class="fas fa-arrow-left text-lg"></i></a><div><h1 class="text-xl font-bold text-white"><i class="fas fa-coins text-warning mr-2"></i>Configuración de Créditos</h1><p class="text-sm text-muted mt-0.5">Sistema de costos para revendedores</p></div></div>
    <div class="card p-6">
        <form method="POST" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-muted mb-1.5">Modo de Cobro</label>
                <select name="mode" class="input"><option value="per_day" {{ 'selected' if config.mode == 'per_day' }}>Por Día (costo × días)</option><option value="per_user" {{ 'selected' if config.mode == 'per_user' }}>Por Usuario (costo fijo)</option></select>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div><label class="block text-sm font-medium text-muted mb-1.5">Costo por Día</label><input type="number" name="cost_per_day" class="input" value="{{ config.cost_per_day }}" min="1"></div>
                <div><label class="block text-sm font-medium text-muted mb-1.5">Costo por Usuario</label><input type="number" name="cost_per_user" class="input" value="{{ config.cost_per_user }}" min="1"></div>
                <div><label class="block text-sm font-medium text-muted mb-1.5">Costo Conexión Extra</label><input type="number" name="cost_per_extra_connection" class="input" value="{{ config.cost_per_extra_connection }}" min="1"></div>
            </div>
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i>Guardar Configuración</button>
        </form>
    </div>
</div>
{% endblock %}
