<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>En Mantenimiento — PanelSSH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body{background:#020617;color:#F8FAFC;font-family:system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
        .card{background:#0F172A;border:1px solid #334155;border-radius:16px;padding:40px;max-width:500px;text-align:center}
    </style>
</head>
<body>
    <div class="card">
        <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl mb-6" style="background:rgba(234,179,8,.10);">
            <i class="fas fa-tools text-4xl" style="color:#EAB308;"></i>
        </div>
        <h1 class="text-2xl font-bold text-white mb-3">En Mantenimiento</h1>
        <p class="text-gray-400 text-sm">{{ message }}</p>
        <p class="text-gray-500 text-xs mt-4">Vuelve a intentarlo en unos minutos.</p>
    </div>
</body>
</html>
