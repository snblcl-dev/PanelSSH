<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil — Panel Maestro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body{background:#020617;color:#F8FAFC;font-family:system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
        .card{background:#0F172A;border:1px solid #334155;border-radius:16px;padding:32px;max-width:440px;width:100%}
        .input{background:#1A1E2F;border:1px solid #334155;border-radius:10px;padding:10px 14px;color:#F8FAFC;width:100%;font-size:.875rem}
        .input:focus{outline:none;border-color:#3B82F6;box-shadow:0 0 0 3px rgba(59,130,246,.2)}
        .btn{padding:10px 20px;border-radius:10px;font-size:.875rem;font-weight:600;border:none;cursor:pointer}
        .btn-primary{background:#3B82F6;color:#fff}.btn-primary:hover{background:#2563EB}
        .btn-ghost{background:transparent;color:#94A3B8;border:1px solid #334155}
        .flash{padding:10px 14px;border-radius:8px;font-size:.875rem;margin-bottom:14px}
        .flash-success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);color:#4ADE80}
        .flash-danger{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#F87171}
    </style>
</head>
<body>
    <div class="card">
        <div class="text-center mb-6">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-xl mb-3" style="background:rgba(59,130,246,.15);">
                <i class="fas fa-shield-alt text-2xl" style="color:#3B82F6;"></i>
            </div>
            <h1 class="text-xl font-bold text-white">Cambiar Contraseña</h1>
            <p class="text-sm text-gray-400 mt-1">Panel Maestro</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" class="space-y-4">
            <div><label class="block text-sm text-gray-400 mb-1">Contraseña Actual</label><input type="password" name="current_password" class="input" required></div>
            <div><label class="block text-sm text-gray-400 mb-1">Nueva Contraseña</label><input type="password" name="new_password" class="input" required minlength="6"></div>
            <div><label class="block text-sm text-gray-400 mb-1">Confirmar</label><input type="password" name="confirm_password" class="input" required minlength="6"></div>
            <button type="submit" class="btn btn-primary w-full"><i class="fas fa-save mr-2"></i>Cambiar Contraseña</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-ghost w-full block text-center"><i class="fas fa-arrow-left mr-2"></i>Volver al Panel</a>
        </form>
    </div>
</body>
</html>
